<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>项目图解 · 索引</title>
<style>
  :root[data-theme="light"]{--bg:#f7f7f8;--surface:#fff;--surface-2:#f3f4f6;--border:#e5e7eb;--text:#18181b;--dim:#71717a;--accent:#3b82f6;--accent-2:#a855f7;--tag:#eff6ff;--tag-text:#1d4ed8;}
  :root[data-theme="dark"]{--bg:#09090b;--surface:#18181b;--surface-2:#27272a;--border:#3f3f46;--text:#fafafa;--dim:#a1a1aa;--accent:#60a5fa;--accent-2:#c084fc;--tag:#1e293b;--tag-text:#93c5fd;}
  *{box-sizing:border-box;}html,body{margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;transition:background .3s,color .3s;}
  .wrap{max-width:920px;margin:0 auto;padding:40px 20px 80px;}
  .eyebrow{display:inline-block;font-family:ui-monospace,monospace;font-size:13px;font-weight:700;background:var(--surface-2);padding:3px 10px;border-radius:8px;margin-bottom:10px;}
  h1{font-size:30px;margin:0 0 6px;letter-spacing:-.02em;}
  .subtitle{color:var(--dim);margin:0 0 4px;}
  .toolbar{display:flex;justify-content:flex-end;margin:14px 0 28px;}
  .theme-btn{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;}
  .theme-btn:hover{background:var(--surface-2);}
  .meta-row{color:var(--dim);font-size:14px;margin-bottom:24px;}
  .meta-row code{font-family:ui-monospace,monospace;background:var(--surface-2);padding:2px 6px;border-radius:5px;border:1px solid var(--border);font-size:.88em;}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
  a.card{display:block;text-decoration:none;color:inherit;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;transition:transform .15s,border-color .15s,box-shadow .15s;}
  a.card:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:0 8px 24px rgba(59,130,246,.12);}
  .card .num{font-family:ui-monospace,monospace;font-size:12px;color:var(--dim);}
  .card h3{font-size:17px;margin:6px 0 8px;}
  .card p{color:var(--dim);font-size:14px;margin:0 0 12px;min-height:42px;}
  .tags{display:flex;flex-wrap:wrap;gap:6px;}
  .tag{font-family:ui-monospace,monospace;font-size:11px;background:var(--tag);color:var(--tag-text);padding:2px 8px;border-radius:99px;}
  .tag.claim{background:transparent;border:1px dashed var(--accent-2);color:var(--accent-2);}
  .arrow{color:var(--accent);font-family:ui-monospace,monospace;font-weight:700;}
  .empty{color:var(--dim);text-align:center;padding:60px 0;}
  footer{margin-top:40px;color:var(--dim);font-size:12px;text-align:center;}
</style>
</head>
<body>
<div class="wrap">
  <span class="eyebrow" id="eyebrow">SHOWCASE</span>
  <h1 id="title">载入中…</h1>
  <p class="subtitle" id="subtitle"></p>
  <div class="toolbar"><button class="theme-btn" id="theme-toggle">☀️ 浅色</button></div>
  <div class="meta-row" id="meta"></div>
  <div class="grid" id="grid"></div>
  <footer id="footer"></footer>
</div>

<script>
/* ================================================================
   ★ 唯一要改的地方：INDEX 数据 ★
   ================================================================ */
const INDEX = {
  title: "BondCode 图解",
  subtitle: "把项目里最该讲清楚的流程，做成会动的笔记",
  eyebrow: "BONDCODE · SHOWCASE",
  project: "bond-code",          // 项目名（显示用）
  sourceLabel: "local repo",     // 备注：来源
  notes: [
    { file: "agent-loop.html",        title: "Agent Loop：带安全门的循环",
      summary: "模型 → 工具调用 → Policy.Decide 安全门 → 执行 → 结果回喂，BondCode 的招牌循环。",
      type: "agent-loop", claim: "" },
    { file: "agent-loop-auto.html",   title: "Agent Loop（自动布局版）",
      summary: "同一张图，用 layout:auto 自动布局生成——对比手摆版看自动布局的差距。",
      type: "agent-loop", claim: "" },
    // 继续加：{ file, title, summary, type, claim }
  ],
};

/* 渲染（一般不用改） */
const $ = (id) => document.getElementById(id);
function init() {
  $("eyebrow").textContent = INDEX.eyebrow || "SHOWCASE";
  $("title").textContent = INDEX.title;
  $("subtitle").textContent = INDEX.subtitle || "";
  $("meta").innerHTML = `项目 <code>${INDEX.project}</code> · ${INDEX.notes.length} 张笔记 · ${INDEX.sourceLabel}`;
  const grid = $("grid");
  if (!INDEX.notes.length) {
    grid.innerHTML = '<div class="empty">还没有笔记</div>';
  } else {
    grid.innerHTML = INDEX.notes.map((n, i) => `
      <a class="card" href="${n.file}">
        <div class="num">FIG · ${String(i + 1).padStart(2, "0")}</div>
        <h3>${n.title} <span class="arrow">→</span></h3>
        <p>${n.summary}</p>
        <div class="tags">
          <span class="tag">${n.type}</span>
          ${n.claim ? `<span class="tag claim">简历: ${n.claim}</span>` : ""}
        </div>
      </a>`).join("");
  }
  $("footer").textContent = "由 proj-to-showcase × step-viz-note 生成";
  $("theme-toggle").onclick = () => {
    const r = document.documentElement;
    const dark = r.getAttribute("data-theme") === "dark";
    r.setAttribute("data-theme", dark ? "light" : "dark");
    $("theme-toggle").textContent = dark ? "🌙 深色" : "☀️ 浅色";
  };
}
init();
</script>
</body>
</html>
