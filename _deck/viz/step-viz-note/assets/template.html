<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>图解笔记 · 模板</title>
<style>
  /* ============================================================
     主题变量 —— 切换 data-theme 即可换肤
     ============================================================ */
  :root[data-theme="light"] {
    --bg: #f7f7f8;
    --surface: #ffffff;
    --surface-2: #f3f4f6;
    --border: #e5e7eb;
    --text: #18181b;
    --text-dim: #71717a;
    --accent: #3b82f6;
    --accent-2: #a855f7;
    --ok: #10b981;
    --node-fill: #ffffff;
    --node-stroke: #d4d4d8;
    --node-text: #3f3f46;
    --active-fill: #3b82f6;
    --active-stroke: #2563eb;
    --active-text: #ffffff;
    --end-fill: #a855f7;
    --end-stroke: #9333ea;
    --edge: #cbd5e1;
    --edge-active: #3b82f6;
    --code-bg: #f4f4f5;
  }
  :root[data-theme="dark"] {
    --bg: #09090b;
    --surface: #18181b;
    --surface-2: #27272a;
    --border: #3f3f46;
    --text: #fafafa;
    --text-dim: #a1a1aa;
    --accent: #60a5fa;
    --accent-2: #c084fc;
    --ok: #34d399;
    --node-fill: #18181b;
    --node-stroke: #52525b;
    --node-text: #e4e4e7;
    --active-fill: #2563eb;
    --active-stroke: #60a5fa;
    --active-text: #ffffff;
    --end-fill: #9333ea;
    --end-stroke: #c084fc;
    --edge: #3f3f46;
    --edge-active: #60a5fa;
    --code-bg: #18181b;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
      "Microsoft YaHei", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    transition: background 0.3s, color 0.3s;
  }

  /* ============================================================
     布局
     ============================================================ */
  .wrap { max-width: 1000px; margin: 0 auto; padding: 32px 20px 80px; }

  header.page-head { margin-bottom: 28px; }
  .eyebrow {
    display: inline-block;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 13px; font-weight: 700;
    background: var(--surface-2); color: var(--text);
    padding: 3px 10px; border-radius: 8px; margin-bottom: 10px;
  }
  h1.title { font-size: 30px; margin: 0 0 6px; letter-spacing: -0.02em; }
  p.subtitle { color: var(--text-dim); margin: 0; font-size: 16px; }

  .toolbar { display: flex; justify-content: flex-end; margin-top: 14px; }
  .theme-btn {
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 12px; font-size: 13px; cursor: pointer;
    transition: background 0.2s;
  }
  .theme-btn:hover { background: var(--surface-2); }

  /* ============================================================
     动效图解面板
     ============================================================ */
  .viz {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 18px; margin-bottom: 24px;
  }
  .viz-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 18px; }
  @media (max-width: 760px) { .viz-grid { grid-template-columns: 1fr; } }

  .panel-label {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px; color: var(--text-dim); margin-bottom: 8px;
  }

  .diagram-scroll { display: flex; justify-content: center; }
  svg.diagram { display: block; max-width: 100%; height: auto; width: auto; background: var(--surface-2); border-radius: 8px; }

  /* 节点 / 连线 —— 全部走 CSS 变量，切换主题时平滑过渡 */
  svg.diagram .node-shape { transition: fill 0.4s, stroke 0.4s, filter 0.4s; }
  svg.diagram .node-label {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px; font-weight: 600;
    fill: var(--node-text); transition: fill 0.4s;
    text-anchor: middle; dominant-baseline: middle;
  }
  svg.diagram .node.active .node-shape { fill: var(--active-fill); stroke: var(--active-stroke); filter: drop-shadow(0 0 7px var(--accent)); }
  svg.diagram .node.active .node-label { fill: var(--active-text); }
  svg.diagram .node.end.active .node-shape { fill: var(--end-fill); stroke: var(--end-stroke); filter: drop-shadow(0 0 7px var(--accent-2)); }
  svg.diagram .edge { stroke: var(--edge); stroke-width: 1.5; fill: none; transition: stroke 0.4s, stroke-width 0.4s; }
  svg.diagram .edge.active { stroke: var(--edge-active); stroke-width: 2.6; }
  svg.diagram .edge-label {
    font-family: ui-monospace, monospace; font-size: 10px;
    fill: var(--text-dim); text-anchor: middle;
  }

  /* 消息流（模拟器） */
  .messages {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px; min-height: 300px;
    display: flex; flex-direction: column; gap: 8px;
    overflow-y: auto; max-height: 460px;
  }
  .msg {
    border-radius: 8px; padding: 8px 11px; color: #fff;
    animation: msgIn 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .msg .role { font-family: ui-monospace, monospace; font-size: 11px; font-weight: 700; opacity: 0.95; }
  .msg .detail { font-size: 12px; opacity: 0.88; margin-top: 2px; word-break: break-word; }
  .msg.user { background: var(--accent); }
  .msg.assistant, .msg.tool_call { background: #52525b; }
  .msg.tool_result { background: var(--ok); }
  .msg.end { background: var(--accent-2); }
  .msg.empty { background: transparent; color: var(--text-dim); text-align: center; font-size: 12px; }
  @keyframes msgIn { from { opacity: 0; transform: translateY(12px) scale(0.94); } to { opacity: 1; transform: none; } }

  /* 步骤说明 */
  .step-info {
    margin-top: 14px; padding: 12px 14px;
    background: var(--surface-2); border-left: 3px solid var(--accent);
    border-radius: 6px;
  }
  .step-info .step-title { font-weight: 700; font-size: 15px; }
  .step-info .step-desc { color: var(--text-dim); font-size: 14px; margin-top: 2px; }

  /* 控制条 */
  .controls {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    margin-top: 16px;
  }
  .ctrl-btn {
    background: var(--surface); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 14px; font-size: 14px; cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    min-width: 44px;
  }
  .ctrl-btn:hover { background: var(--surface-2); }
  .ctrl-btn:active { transform: scale(0.96); }
  .ctrl-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .ctrl-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .progress {
    flex: 1; min-width: 120px; height: 6px; background: var(--surface-2);
    border-radius: 99px; overflow: hidden;
  }
  .progress > i { display: block; height: 100%; width: 0; background: var(--accent); transition: width 0.3s; }
  .step-count { font-family: ui-monospace, monospace; font-size: 13px; color: var(--text-dim); }
  .speed { font-size: 13px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }
  .speed select {
    background: var(--surface); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 6px; font-size: 13px;
  }

  /* ============================================================
     正文（markdown 渲染区）
     ============================================================ */
  .prose { margin-top: 8px; }
  .prose h2 { font-size: 22px; margin: 32px 0 12px; letter-spacing: -0.01em; }
  .prose h3 { font-size: 18px; margin: 24px 0 8px; }
  .prose p { margin: 10px 0; color: var(--text); }
  .prose ul, .prose ol { margin: 10px 0; padding-left: 22px; }
  .prose li { margin: 4px 0; }
  .prose code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 0.88em; background: var(--code-bg); padding: 2px 6px;
    border-radius: 5px; border: 1px solid var(--border);
  }
  .prose pre {
    background: var(--code-bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px; overflow-x: auto; margin: 14px 0;
  }
  .prose pre code { background: none; border: none; padding: 0; font-size: 13px; }
  .prose blockquote {
    border-left: 3px solid var(--accent); margin: 14px 0; padding: 4px 16px;
    color: var(--text-dim); background: var(--surface-2); border-radius: 0 8px 8px 0;
  }
  .prose strong { color: var(--text); }
</style>
</head>
<body>
<div class="wrap">

  <header class="page-head">
    <span class="eyebrow" id="eyebrow">FIG · 01</span>
    <h1 class="title" id="doc-title">载入中…</h1>
    <p class="subtitle" id="doc-subtitle"></p>
    <div class="toolbar">
      <button class="theme-btn" id="theme-toggle">🌙 深色</button>
    </div>
  </header>

  <!-- 动效图解：SVG 流程图 + 消息流，同一时间轴驱动 -->
  <section class="viz">
    <div class="viz-grid">
      <!-- 左：SVG 流程图 -->
      <div>
        <div class="panel-label" id="diagram-label">flow</div>
        <div class="diagram-scroll">
          <svg class="diagram" id="diagram" viewBox="0 0 500 440" preserveAspectRatio="xMidYMid meet"></svg>
        </div>
      </div>
      <!-- 右：消息流（模拟器） -->
      <div>
        <div class="panel-label">messages[ ]</div>
        <div class="messages" id="messages"></div>
      </div>
    </div>

    <!-- 步骤说明 -->
    <div class="step-info">
      <div class="step-title" id="step-title">—</div>
      <div class="step-desc" id="step-desc">—</div>
    </div>

    <!-- 控制条 -->
    <div class="controls">
      <button class="ctrl-btn" id="btn-prev" title="上一步">◀</button>
      <button class="ctrl-btn primary" id="btn-play">▶ 播放</button>
      <button class="ctrl-btn" id="btn-next" title="下一步">▶</button>
      <button class="ctrl-btn" id="btn-reset">↺ 重置</button>
      <div class="progress"><i id="progress-bar"></i></div>
      <span class="step-count" id="step-count">0 / 0</span>
      <label class="speed">速度
        <select id="speed">
          <option value="2000">0.5×</option>
          <option value="1200" selected>1×</option>
          <option value="700">2×</option>
          <option value="350">4×</option>
        </select>
      </label>
    </div>
  </section>

  <!-- 正文区 -->
  <article class="prose" id="prose"></article>
</div>

<script>
/* ================================================================
   ★★★ 这是唯一需要修改的地方 ★★★
   把下面的 DATA 换成你的主题。其余渲染逻辑无需改动。
   ----------------------------------------------------------------
   - diagram.layout : 设为 "auto" 即自动布局，节点只需 {id,label,type,end?}，不用填坐标
   - diagram.nodes : 节点。auto 模式 {id,label,type:'rect'|'diamond',end?}；手摆模式再加 x,y,w,h
   - diagram.edges : 连线 {from,to,label?}
   - steps[]      : 时间轴。每一步同时驱动【图高亮】+【消息流】+【说明】
                    · activeNodes / activeEdges : 本步高亮哪些节点/连线
                    · messages  : 本步新增哪些消息（累加显示）
                    · title/desc: 本步的文字注解
   - content      : 正文 markdown（支持 # ## ### **` 列表 > 代码块）
   ================================================================ */
const DATA = {
  meta: {
    eyebrow: "FIG · 01",
    title: "Agent 循环",
    subtitle: "一个 while 循环 + 一个工具 = 一个 Agent",
    diagramLabel: "while (stop_reason === \"tool_use\")",
  },
  diagram: {
    layout: "auto",          // ★ 自动布局：只给 id/label/type + from/to，坐标自动算
    // layoutOpts: { nodeW: 150, nodeH: 46, gapX: 56, gapY: 70, margin: 50 },  // 可选，全有默认
    nodes: [
      { id: "start",   label: "Start",         type: "rect" },
      { id: "api",     label: "API Call",      type: "rect" },
      { id: "check",   label: "stop_reason?",  type: "diamond" },
      { id: "execute", label: "Execute Tool",  type: "rect" },
      { id: "append",  label: "Append Result", type: "rect" },
      { id: "end",     label: "Break / Done",  type: "rect", end: true },
    ],
    edges: [
      { from: "start",   to: "api" },
      { from: "api",     to: "check" },
      { from: "check",   to: "execute", label: "tool_use" },
      { from: "execute", to: "append" },
      { from: "append",  to: "api" },
      { from: "check",   to: "end",     label: "end_turn" },
    ],
  },
  steps: [
    { title: "主循环", desc: "每个 agent 本质都是一个 while 循环：不断调用模型，直到它说“停”。", activeNodes: [], activeEdges: [], messages: [] },
    { title: "用户输入", desc: "循环从用户发来一条消息开始。", activeNodes: ["start"], activeEdges: [], messages: [{ role: "user", detail: "修复登录 bug" }] },
    { title: "调用模型", desc: "把所有消息发给 LLM，它看到全部上下文后决定下一步。", activeNodes: ["api"], activeEdges: ["start->api"], messages: [] },
    { title: "stop_reason = tool_use", desc: "模型想用工具，循环继续。", activeNodes: ["check", "execute"], activeEdges: ["api->check", "check->execute"], messages: [{ role: "assistant", detail: "tool_use: read_file" }] },
    { title: "执行并追加结果", desc: "执行工具，把结果写回 messages[]，再喂回模型。", activeNodes: ["execute", "append"], activeEdges: ["execute->append"], messages: [{ role: "tool_result", detail: "auth.ts 内容…" }] },
    { title: "再次循环", desc: "同一段代码路径，第二轮迭代。模型决定改文件。", activeNodes: ["api", "check", "execute", "append"], activeEdges: ["append->api", "api->check", "check->execute", "execute->append"], messages: [{ role: "assistant", detail: "tool_use: edit_file" }, { role: "tool_result", detail: "file updated" }] },
    { title: "stop_reason = end_turn", desc: "模型完成了。循环退出。这就是整个 agent。", activeNodes: ["check", "end"], activeEdges: ["api->check", "check->end"], messages: [{ role: "end", detail: "end_turn: Done!" }] },
  ],
  content: `
## 这一章要解决什么问题

语言模型本身只会"生成下一段内容"，它不会自己读文件、跑命令、看报错。
**把"模型 + 工具"连接成一个能持续推进的主循环**，就是这一章的目标。

## 最小心智模型

> 工具结果必须重新进入消息历史，成为下一轮推理的输入。

如果少了这一步，模型就无法基于真实观察继续工作。

## 关键代码

\`\`\`python
def agent_loop(state):
    while True:
        response = client.messages.create(
            model=MODEL, system=SYSTEM,
            messages=state["messages"], tools=TOOLS,
        )
        state["messages"].append({"role": "assistant", "content": response.content})
        if response.stop_reason != "tool_use":
            return
        # 执行工具，把结果写回 messages[]
        ...
\`\`\`

## 初学者最容易犯的错

- 把工具结果打印出来，但**不写回 \`messages\`**
- 只保存用户消息，**不保存 assistant 消息**
- 不给工具结果绑定 \`tool_use_id\`

## 一句话记住

**Agent 的本质，是把"模型的动作意图"变成"真实执行结果"，再把结果送回模型继续推理。**
`,
};

/* ================================================================
   以下为渲染引擎，一般无需修改
   ================================================================ */
const $ = (id) => document.getElementById(id);
const NS = "http://www.w3.org/2000/svg";

let current = 0;
let playing = false;
let timer = null;
let shownIds = new Set(); // 已渲染过的消息 key，避免重复动画

function el(tag, attrs = {}) {
  const n = document.createElementNS(NS, tag);
  for (const k in attrs) n.setAttribute(k, attrs[k]);
  return n;
}

function getNode(id) { return DATA.diagram.nodes.find(n => n.id === id); }

// 通用布线：按源/目标的相对位置自动选路由，不依赖特定节点 id
function edgePath(fromId, toId) {
  const f = getNode(fromId), t = getNode(toId);
  // 回环：目标在源上方 → 走左侧通道绕回
  if (t.y < f.y - 5) {
    const sx = f.x - f.w/2, sy = f.y, ex = t.x - t.w/2, ey = t.y;
    const lane = Math.min(sx, ex) - 45;
    return `M ${sx} ${sy} L ${lane} ${sy} L ${lane} ${ey} L ${ex} ${ey}`;
  }
  // 右分支：目标明显在右 → 横到中点再折向目标
  if (t.x > f.x + f.w/2 + 12) {
    const sx = f.x + f.w/2, sy = f.y, ex = t.x - t.w/2, ey = t.y;
    const mx = (sx + ex) / 2;
    return `M ${sx} ${sy} L ${mx} ${sy} L ${mx} ${ey} L ${ex} ${ey}`;
  }
  // 左下：目标在左且不高于源 → 先下行再左拐
  if (t.x < f.x - 12 && t.y >= f.y - 5) {
    const sx = f.x, sy = f.y + f.h/2, ex = t.x, ey = t.y - t.h/2;
    const my = (sy + ey) / 2;
    return `M ${sx} ${sy} L ${sx} ${my} L ${ex} ${my} L ${ex} ${ey}`;
  }
  // 默认垂直
  const sx = f.x, sy = f.y + f.h/2, ex = t.x, ey = t.y - t.h/2;
  return `M ${sx} ${sy} L ${ex} ${ey}`;
}

/* ---------- 自动布局（layout:"auto" 时启用）----------
   只给 nodes 的 {id,label,type,end?} + edges 的 {from,to,label?}，自动算坐标。
   分层（Sugiyama 简化版）：DFS 找回边 → 最长路径定层 → 层内按父节点重心排序 → 坐标化。
   不依赖特定节点 id，任意有向图都能布。 */
let diagramBounds = null;
function autoLayout(nodes, edges, opts) {
  const o = Object.assign({ nodeW: 150, nodeH: 46, gapX: 56, gapY: 70, margin: 50 }, opts || {});
  nodes.forEach(n => { if (!n.w) n.w = o.nodeW; if (!n.h) n.h = o.nodeH; });

  const ids = nodes.map(n => n.id);
  const adj = new Map(ids.map(id => [id, []]));
  edges.forEach(e => { if (adj.has(e.from)) adj.get(e.from).push(e.to); });

  // 1) DFS 检测回边（成环的边），定层时忽略；布线时它们自动走左侧回环
  const color = new Map(ids.map(id => [id, 0])); // 0=white 1=gray 2=black
  const back = new Set();
  function dfs(u) {
    color.set(u, 1);
    for (const v of adj.get(u) || []) {
      const c = color.get(v);
      if (c === 1) back.add(u + "->" + v);
      else if (c === 0) dfs(v);
    }
    color.set(u, 2);
  }
  ids.forEach(id => { if (color.get(id) === 0) dfs(id); });
  const isBack = (from, to) => back.has(from + "->" + to);

  // 2) Kahn 拓扑序（忽略回边）+ 收集父节点
  const indeg = new Map(ids.map(id => [id, 0]));
  const parents = new Map(ids.map(id => [id, []]));
  edges.forEach(e => {
    if (isBack(e.from, e.to) || !indeg.has(e.to)) return;
    indeg.set(e.to, indeg.get(e.to) + 1);
    parents.get(e.to).push(e.from);
  });
  const queue = ids.filter(id => indeg.get(id) === 0);
  const topo = [];
  const seen = new Set();
  while (queue.length) {
    const u = queue.shift();
    if (seen.has(u)) continue;
    seen.add(u); topo.push(u);
    for (const v of adj.get(u) || []) {
      if (isBack(u, v)) continue;
      indeg.set(v, indeg.get(v) - 1);
      if (indeg.get(v) === 0) queue.push(v);
    }
  }
  ids.forEach(id => { if (!seen.has(id)) topo.push(id); }); // 纯环兜底

  // 3) 最长路径定层：rank[v] = max(rank[父]+1)
  const rank = new Map(ids.map(id => [id, 0]));
  for (const id of topo) {
    let r = 0;
    for (const p of parents.get(id) || []) r = Math.max(r, rank.get(p) + 1);
    rank.set(id, r);
  }
  const maxRank = Math.max(0, ...rank.values());
  const layers = Array.from({ length: maxRank + 1 }, () => []);
  nodes.forEach(n => layers[rank.get(n.id)].push(n));

  // 4)+5) 逐层：按父节点重心排序 → 水平居中到最宽层 → 赋坐标
  const layerWidth = (layer) => layer.reduce((s, n) => s + n.w, 0) + Math.max(0, layer.length - 1) * o.gapX;
  const maxLayerW = Math.max(...layers.map(layerWidth));
  const posX = new Map();
  for (const layer of layers) {
    layer.sort((a, b) => {
      const avg = (id) => {
        const ps = parents.get(id) || [];
        if (!ps.length) return 0;
        return ps.reduce((s, p) => s + (posX.get(p) ?? 0), 0) / ps.length;
      };
      return avg(a.id) - avg(b.id);
    });
    const w = layerWidth(layer);
    let x = o.margin + (maxLayerW - w) / 2;
    for (const n of layer) {
      n.x = x + n.w / 2; posX.set(n.id, n.x); x += n.w + o.gapX;
    }
  }
  nodes.forEach(n => { n.y = o.margin + rank.get(n.id) * (o.nodeH + o.gapY) + n.h / 2; });

  return { width: o.margin * 2 + maxLayerW, height: o.margin * 2 + maxRank * (o.nodeH + o.gapY) + o.nodeH };
}
function applyAutoLayoutIfNeeded() {
  diagramBounds = null;
  if (DATA.diagram.layout !== "auto") return;
  diagramBounds = autoLayout(DATA.diagram.nodes, DATA.diagram.edges, DATA.diagram.layoutOpts || {});
}

// 计算节点包围盒（auto 模式用 autoLayout 返回值；手摆模式用它自动适配 viewBox，避免图过大/留白）
function computeBounds(nodes) {
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  for (const n of nodes) {
    minX = Math.min(minX, n.x - n.w/2); minY = Math.min(minY, n.y - n.h/2);
    maxX = Math.max(maxX, n.x + n.w/2); maxY = Math.max(maxY, n.y + n.h/2);
  }
  const pad = 24;
  return { x: minX - pad, y: minY - pad, width: (maxX - minX) + pad*2, height: (maxY - minY) + pad*2 };
}

function buildDiagram() {
  const svg = $("diagram");
  svg.innerHTML = "";
  const b = diagramBounds || computeBounds(DATA.diagram.nodes);
  svg.setAttribute("viewBox", `${b.x} ${b.y} ${b.width} ${b.height}`);
  svg.setAttribute("width", b.width);      // 显式宽高 → CSS max-height 能可靠等比缩放
  svg.setAttribute("height", b.height);
  const gDefs = el("defs");
  // 箭头
  for (const [id, cls] of [["arrow","edge"],["arrow-a","edge-active"]]) {
    const m = el("marker", { id, markerWidth: 8, markerHeight: 6, refX: 8, refY: 3, orient: "auto" });
    const p = el("polygon", { points: "0 0, 8 3, 0 6" });
    p.setAttribute("class", cls);
    m.appendChild(p); gDefs.appendChild(m);
  }
  svg.appendChild(gDefs);

  // 连线
  DATA.diagram.edges.forEach(e => {
    const key = `${e.from}->${e.to}`;
    const path = el("path", { d: edgePath(e.from, e.to), "data-key": key });
    path.setAttribute("class", "edge");
    path.setAttribute("marker-end", "url(#arrow)");
    svg.appendChild(path);
    if (e.label) {
      const f = getNode(e.from), t = getNode(e.to);
      const rightward = t.x > f.x + f.w/2 + 12;   // 与 edgePath 的右分支判定一致
      const lx = rightward ? (f.x + t.x)/2 : f.x + 70;
      const ly = rightward ? f.y - 12 : (f.y + t.y)/2;
      const txt = el("text", { x: lx, y: ly });
      txt.setAttribute("class", "edge-label");
      txt.textContent = e.label;
      svg.appendChild(txt);
    }
  });

  // 节点
  DATA.diagram.nodes.forEach(n => {
    const g = el("g", { "data-id": n.id });
    g.setAttribute("class", "node" + (n.end ? " end" : ""));
    let shape;
    if (n.type === "diamond") {
      const hw = n.w/2, hh = n.h/2;
      const pts = `${n.x},${n.y-hh} ${n.x+hw},${n.y} ${n.x},${n.y+hh} ${n.x-hw},${n.y}`;
      shape = el("polygon", { points: pts, rx: 6 });
    } else {
      shape = el("rect", { x: n.x - n.w/2, y: n.y - n.h/2, width: n.w, height: n.h, rx: 8 });
    }
    shape.setAttribute("class", "node-shape");
    shape.setAttribute("fill", "var(--node-fill)");
    shape.setAttribute("stroke", "var(--node-stroke)");
    shape.setAttribute("stroke-width", 1.5);
    g.appendChild(shape);
    const label = el("text", { x: n.x, y: n.y });
    label.setAttribute("class", "node-label");
    label.textContent = n.label;
    g.appendChild(label);
    svg.appendChild(g);
  });
}

function renderStep() {
  const step = DATA.steps[current];

  // 高亮节点
  document.querySelectorAll("svg.diagram .node").forEach(g => {
    g.classList.toggle("active", step.activeNodes.includes(g.dataset.id));
  });
  // 高亮连线
  document.querySelectorAll("svg.diagram .edge").forEach(p => {
    p.classList.toggle("active", step.activeEdges.includes(p.dataset.key));
    p.setAttribute("marker-end", p.classList.contains("active") ? "url(#arrow-a)" : "url(#arrow)");
  });

  // 说明
  $("step-title").textContent = step.title;
  $("step-desc").textContent = step.desc;

  // 消息流：累加 0..current，只让新增消息播放动画
  const box = $("messages");
  box.innerHTML = "";
  shownIds.clear();
  let any = false;
  for (let s = 0; s <= current; s++) {
    const msgs = DATA.steps[s].messages || [];
    msgs.forEach((m, i) => {
      const key = `${s}-${i}`;
      const div = document.createElement("div");
      const cls = m.role.replace(/[^a-z_]/gi, "");
      div.className = `msg ${cls}`;
      div.innerHTML = `<div class="role">${m.role}</div><div class="detail">${escapeHtml(m.detail)}</div>`;
      // 只有"最后一步新加的"才播放滑入；历史消息直接显示
      if (s !== current) div.style.animation = "none";
      box.appendChild(div);
      shownIds.add(key);
      any = true;
    });
  }
  if (!any) {
    const empty = document.createElement("div");
    empty.className = "msg empty";
    empty.textContent = "[ 空 ]";
    empty.style.animation = "none";
    box.appendChild(empty);
  }
  box.scrollTop = box.scrollHeight;

  // 进度 / 计数 / 按钮
  $("progress-bar").style.width = (DATA.steps.length <= 1 ? 0 : (current / (DATA.steps.length - 1)) * 100) + "%";
  $("step-count").textContent = `${current + 1} / ${DATA.steps.length}`;
  $("btn-prev").disabled = current === 0;
  $("btn-next").disabled = current === DATA.steps.length - 1;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
}

function next() { if (current < DATA.steps.length - 1) { current++; renderStep(); } else { pause(); } }
function prev() { if (current > 0) { current--; renderStep(); } }
function reset() { pause(); current = 0; renderStep(); }
function play() {
  if (current === DATA.steps.length - 1) { current = 0; renderStep(); }
  playing = true; $("btn-play").textContent = "⏸ 暂停";
  schedule();
}
function pause() { playing = false; $("btn-play").textContent = "▶ 播放"; if (timer) { clearTimeout(timer); timer = null; } }
function schedule() {
  if (!playing) return;
  const ms = parseInt($("speed").value, 10);
  timer = setTimeout(() => { next(); if (playing) schedule(); }, ms);
}

/* ---------- 极简 Markdown 渲染 ---------- */
function renderMarkdown(md) {
  const lines = md.trim().split("\n");
  let html = "", inCode = false, inUl = false, inOl = false;
  const closeLists = () => { if (inUl) { html += "</ul>"; inUl = false; } if (inOl) { html += "</ol>"; inOl = false; } };
  const inline = (s) => s
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");

  for (let raw of lines) {
    const line = raw;
    if (line.trim().startsWith("```")) { if (inCode) { html += "</code></pre>"; inCode = false; } else { closeLists(); html += "<pre><code>"; inCode = true; } continue; }
    if (inCode) { html += line + "\n"; continue; }
    if (/^###\s/.test(line)) { closeLists(); html += `<h3>${inline(line.slice(3).trim())}</h3>`; continue; }
    if (/^##\s/.test(line)) { closeLists(); html += `<h2>${inline(line.slice(2).trim())}</h2>`; continue; }
    if (/^#\s/.test(line)) { closeLists(); html += `<h2>${inline(line.slice(1).trim())}</h2>`; continue; }
    if (/^>\s?/.test(line)) { closeLists(); html += `<blockquote>${inline(line.replace(/^>\s?/,""))}</blockquote>`; continue; }
    if (/^\s*[-*]\s+/.test(line)) { if (!inUl) { closeLists(); html += "<ul>"; inUl = true; } html += `<li>${inline(line.replace(/^\s*[-*]\s+/,""))}</li>`; continue; }
    if (/^\s*\d+\.\s+/.test(line)) { if (!inOl) { closeLists(); html += "<ol>"; inOl = true; } html += `<li>${inline(line.replace(/^\s*\d+\.\s+/,""))}</li>`; continue; }
    if (line.trim() === "") { closeLists(); continue; }
    closeLists();
    html += `<p>${inline(line.trim())}</p>`;
  }
  if (inCode) html += "</code></pre>";
  closeLists();
  return html;
}

/* ---------- 初始化 ---------- */
function init() {
  $("eyebrow").textContent = DATA.meta.eyebrow || "FIG";
  $("doc-title").textContent = DATA.meta.title;
  $("doc-subtitle").textContent = DATA.meta.subtitle || "";
  $("diagram-label").textContent = DATA.meta.diagramLabel || "flow";
  $("prose").innerHTML = renderMarkdown(DATA.content || "");

  applyAutoLayoutIfNeeded();
  buildDiagram();
  current = 0;
  renderStep();

  $("btn-prev").onclick = () => { pause(); prev(); };
  $("btn-next").onclick = () => { pause(); next(); };
  $("btn-play").onclick = () => { playing ? pause() : play(); };
  $("btn-reset").onclick = reset;
  $("speed").onchange = () => { if (playing) { clearTimeout(timer); schedule(); } };

  // 键盘：← → 空格
  document.addEventListener("keydown", (e) => {
    if (e.target.tagName === "SELECT") return;
    if (e.key === "ArrowRight") { pause(); next(); }
    else if (e.key === "ArrowLeft") { pause(); prev(); }
    else if (e.key === " ") { e.preventDefault(); playing ? pause() : play(); }
  });

  // 主题
  $("theme-toggle").onclick = () => {
    const root = document.documentElement;
    const dark = root.getAttribute("data-theme") === "dark";
    root.setAttribute("data-theme", dark ? "light" : "dark");
    $("theme-toggle").textContent = dark ? "🌙 深色" : "☀️ 浅色";
  };
}
init();
</script>
